<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>갤러리 이미지 스크롤러</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .site-selector {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #eee;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .btn {
      background: #3a7bd5;
      color: #fff;
      border: none;
      padding: 7px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2f65b8; }
    .btn.danger { background: #c0392b; }
    .btn.danger:hover { background: #a93226; }
    .btn.secondary { background: #444; }
    .btn.secondary:hover { background: #555; }

    /* Image grid */
    #gallery {
      columns: 3;
      column-gap: 12px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 900px) { #gallery { columns: 2; } }
    @media (max-width: 550px) { #gallery { columns: 1; } }

    .img-card {
      break-inside: avoid;
      margin-bottom: 12px;
      background: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .img-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }
    .img-card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .img-card .caption {
      padding: 8px 10px;
      font-size: 0.78rem;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #loader {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 0.9rem;
    }

    #loader .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #333;
      border-top-color: #3a7bd5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 28px;
      width: 90%;
      max-width: 520px;
      border: 1px solid #333;
    }
    .modal h2 { margin-bottom: 20px; font-size: 1.1rem; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #eee;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 300;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 85vh; object-fit: contain; border-radius: 8px; }
    .lightbox .lb-caption { color: #aaa; font-size: 0.85rem; margin-top: 12px; }
    .lightbox .lb-close {
      position: absolute;
      top: 20px; right: 24px;
      font-size: 2rem;
      cursor: pointer;
      color: #fff;
      line-height: 1;
    }

    /* Site list panel */
    #siteListPanel {
      display: none;
      position: fixed;
      top: 56px; right: 0;
      width: 340px;
      background: #1a1a1a;
      border-left: 1px solid #333;
      height: calc(100vh - 56px);
      overflow-y: auto;
      z-index: 90;
      padding: 20px;
    }
    #siteListPanel.open { display: block; }
    .site-item {
      background: #242424;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-item .site-name { font-size: 0.9rem; font-weight: 500; }
    .site-item .site-sub { font-size: 0.75rem; color: #777; margin-top: 3px; }
    .site-item-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 10px; }

    .empty-msg {
      text-align: center;
      color: #555;
      padding: 60px 20px;
      font-size: 0.9rem;
    }

    .error-msg {
      text-align: center;
      color: #e74c3c;
      padding: 40px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>📷 갤러리 스크롤러</h1>
  <div class="header-actions">
    <select id="siteSelect" class="site-selector"></select>
    <button class="btn" onclick="openAddModal()">+ 사이트 추가</button>
    <button class="btn secondary" onclick="toggleSitePanel()">사이트 관리</button>
  </div>
</header>

<!-- Site management panel -->
<div id="siteListPanel">
  <h3 style="margin-bottom:16px;">등록된 사이트</h3>
  <div id="siteList"></div>
  <button class="btn" style="width:100%;margin-top:8px;" onclick="openAddModal()">+ 새 사이트 추가</button>
</div>

<!-- Gallery -->
<div id="gallery"></div>
<div id="loader">
  <div class="spinner"></div>
  <p>이미지 불러오는 중...</p>
</div>

<!-- Add/Edit modal -->
<div class="modal-overlay" id="siteModal">
  <div class="modal">
    <h2 id="modalTitle">사이트 추가</h2>
    <div class="form-group">
      <label>사이트 이름</label>
      <input id="inputName" type="text" placeholder="예: 필름카메라 갤러리" />
    </div>
    <div class="form-group">
      <label>갤러리 종류</label>
      <select id="inputType">
        <option value="dcinside">DC인사이드 마이너 갤러리</option>
        <option value="dcinside_major">DC인사이드 일반 갤러리</option>
      </select>
    </div>
    <div class="form-group">
      <label>갤러리 ID</label>
      <input id="inputGalleryId" type="text" placeholder="예: film_camera" />
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">취소</button>
      <button class="btn" onclick="saveSite()">저장</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lb-close">&times;</span>
  <img id="lbImg" src="" alt="" />
  <div class="lb-caption" id="lbCaption"></div>
</div>

<script>
let currentSiteId = null;
let currentPage = 1;
let loading = false;
let hasMore = true;
let editingId = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  return res.json();
}

async function loadSites() {
  const sites = await api('GET', '/api/sites');
  const sel = document.getElementById('siteSelect');
  sel.innerHTML = sites.map(s =>
    `<option value="${s.id}">${s.name}</option>`
  ).join('');
  renderSiteList(sites);
  if (sites.length > 0) {
    currentSiteId = sel.value;
    resetAndLoad();
  }
}

function renderSiteList(sites) {
  const el = document.getElementById('siteList');
  if (!sites.length) {
    el.innerHTML = '<div class="empty-msg">등록된 사이트가 없습니다</div>';
    return;
  }
  el.innerHTML = sites.map(s => `
    <div class="site-item">
      <div>
        <div class="site-name">${s.name}</div>
        <div class="site-sub">${s.galleryId}</div>
      </div>
      <div class="site-item-actions">
        <button class="btn secondary" style="padding:4px 10px;font-size:0.78rem;" onclick="openEditModal('${s.id}')">수정</button>
        <button class="btn danger" style="padding:4px 10px;font-size:0.78rem;" onclick="deleteSite('${s.id}')">삭제</button>
      </div>
    </div>
  `).join('');
}

function resetAndLoad() {
  document.getElementById('gallery').innerHTML = '';
  currentPage = 1;
  hasMore = true;
  loadImages();
}

async function loadImages() {
  if (loading || !hasMore) return;
  loading = true;
  const loader = document.getElementById('loader');
  loader.innerHTML = '<div class="spinner"></div><p>이미지 불러오는 중...</p>';
  loader.style.display = 'block';

  try {
    const data = await api('GET', `/api/images?siteId=${currentSiteId}&page=${currentPage}`);
    if (data.error) {
      loader.innerHTML = `<div class="error-msg">오류: ${data.error}</div>`;
      loading = false;
      return;
    }
    if (!data.images || data.images.length === 0) {
      hasMore = false;
      loader.innerHTML = '<div class="empty-msg">더 이상 이미지가 없습니다</div>';
      loading = false;
      return;
    }
    renderImages(data.images);
    currentPage++;
    loader.innerHTML = '';
    loader.style.display = 'none';
  } catch (e) {
    loader.innerHTML = `<div class="error-msg">네트워크 오류: ${e.message}</div>`;
  }
  loading = false;
}

function renderImages(images) {
  const gallery = document.getElementById('gallery');
  images.forEach(img => {
    const card = document.createElement('div');
    card.className = 'img-card';
    card.innerHTML = `
      <img src="${img.src}" alt="${img.title || ''}" loading="lazy"
           onerror="this.closest('.img-card').remove()" />
      <div class="caption">${img.title || '제목 없음'}</div>
    `;
    card.querySelector('img').addEventListener('click', () => openLightbox(img.src, img.title));
    gallery.appendChild(card);
  });
}

// Infinite scroll
window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
    loadImages();
  }
});

// Site select change
document.getElementById('siteSelect').addEventListener('change', e => {
  currentSiteId = e.target.value;
  resetAndLoad();
});

// Modal
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '사이트 추가';
  document.getElementById('inputName').value = '';
  document.getElementById('inputGalleryId').value = '';
  document.getElementById('inputType').value = 'dcinside';
  document.getElementById('siteModal').classList.add('open');
}

async function openEditModal(id) {
  const sites = await api('GET', '/api/sites');
  const s = sites.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '사이트 수정';
  document.getElementById('inputName').value = s.name;
  document.getElementById('inputGalleryId').value = s.galleryId;
  document.getElementById('inputType').value = s.type;
  document.getElementById('siteModal').classList.add('open');
}

function closeModal() {
  document.getElementById('siteModal').classList.remove('open');
}

async function saveSite() {
  const name = document.getElementById('inputName').value.trim();
  const type = document.getElementById('inputType').value;
  const galleryId = document.getElementById('inputGalleryId').value.trim();
  if (!name || !galleryId) { alert('이름과 갤러리 ID를 입력하세요'); return; }

  if (editingId) {
    await api('PUT', `/api/sites/${editingId}`, { name, type, galleryId });
  } else {
    await api('POST', '/api/sites', { name, type, galleryId });
  }
  closeModal();
  await loadSites();
}

async function deleteSite(id) {
  if (!confirm('이 사이트를 삭제할까요?')) return;
  await api('DELETE', `/api/sites/${id}`);
  await loadSites();
}

function toggleSitePanel() {
  document.getElementById('siteListPanel').classList.toggle('open');
}

// Lightbox
function openLightbox(src, title) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lbCaption').textContent = title || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// Init
loadSites();
</script>
</body>
</html>
