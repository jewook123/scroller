<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>필름 갤러리 스크롤러</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      background: #000; color: #fff;
      font-family: 'Segoe UI', sans-serif;
      user-select: none;
    }
    #viewer {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.38s cubic-bezier(.4,0,.2,1);
      will-change: transform; background: #000;
    }
    .slide img {
      max-width: 100%; max-height: 100vh;
      object-fit: contain; display: block; pointer-events: none;
    }
    .slide-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 60px 20px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
    }
    .slide-caption .title {
      font-size: 0.95rem; font-weight: 600; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .slide-caption a { font-size: 0.78rem; color: #aaa; text-decoration: none; }
    .slide-caption a:hover { color: #fff; }
    .slide-center {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      color: #666; text-align: center; padding: 30px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333; border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-text { color: #e74c3c; font-size: 0.88rem; max-width: 320px; line-height: 1.7; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; padding: 14px 18px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(rgba(0,0,0,0.55), transparent); z-index: 50;
    }
    .hud-left { display: flex; align-items: center; gap: 10px; }
    #hud h1 { font-size: 1rem; font-weight: 700; }
    .badge {
      background: rgba(255, 0, 120, 0.85); color: #fff;
      font-size: 0.72rem; font-weight: 700;
      padding: 3px 9px; border-radius: 12px;
      max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .icon-btn {
      background: rgba(255,255,255,0.12); border: none; color: #fff;
      width: 38px; height: 38px; border-radius: 50%; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.22); }

    #counter {
      position: fixed; bottom: 80px; right: 16px;
      font-size: 0.78rem; color: rgba(255,255,255,0.45); z-index: 50;
    }
    #dots {
      position: fixed; right: 12px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 5px; z-index: 50;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.25); transition: background 0.2s, transform 0.2s;
    }
    .dot.active { background: #fff; transform: scale(1.6); }

    .nav-arrow {
      position: fixed; left: 50%; transform: translateX(-50%); z-index: 50;
      background: rgba(255,255,255,0.08); border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem; cursor: pointer;
      backdrop-filter: blur(4px); transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-arrow:hover { background: rgba(255,255,255,0.2); }
    #arrowUp   { top: 68px; }
    #arrowDown { bottom: 14px; }

    #panel {
      position: fixed; top: 0; right: -360px; width: 340px; height: 100%;
      background: #111; border-left: 1px solid #222; z-index: 200;
      transition: right 0.3s ease; display: flex; flex-direction: column;
    }
    #panel.open { right: 0; }
    #panel-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 199;
    }
    #panel-overlay.open { display: block; }
    #panel-header {
      padding: 20px 18px 14px; border-bottom: 1px solid #222;
      display: flex; align-items: center; justify-content: space-between;
    }
    #panel-header h2 { font-size: 1rem; }
    #panel-body { flex: 1; overflow-y: auto; padding: 14px; }

    .feed-card {
      background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 10px;
      padding: 12px 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s;
    }
    .feed-card:hover { border-color: #555; }
    .feed-card.active { border-color: #ff0078; }
    .feed-card .fc-name { font-size: 0.9rem; font-weight: 600; }
    .feed-card .fc-tag  { font-size: 0.75rem; color: #666; margin-top: 3px; }
    .feed-card-actions  { display: flex; gap: 6px; margin-top: 10px; }

    .btn {
      border: none; cursor: pointer; border-radius: 6px;
      font-size: 0.8rem; padding: 5px 12px; transition: background 0.2s;
    }
    .btn-primary   { background: #ff0078; color: #fff; }
    .btn-primary:hover { background: #d4006a; }
    .btn-secondary { background: #2a2a2a; color: #ccc; }
    .btn-secondary:hover { background: #333; }
    .btn-danger    { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #a93226; }
    .btn-full { width: 100%; padding: 9px; margin-top: 4px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a1a; border: 1px solid #333;
      border-radius: 14px; padding: 28px; width: 90%; max-width: 400px;
    }
    .modal h2 { margin-bottom: 20px; font-size: 1rem; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.8rem; color: #999; margin-bottom: 6px; }
    .form-group input {
      width: 100%; background: #242424; border: 1px solid #3a3a3a;
      color: #eee; padding: 9px 12px; border-radius: 8px; font-size: 0.9rem;
    }
    .form-hint { font-size: 0.74rem; color: #555; margin-top: 5px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-left">
    <h1>📷</h1>
    <span class="badge" id="badge">Flickr</span>
  </div>
  <button class="icon-btn" onclick="openPanel()">☰</button>
</div>

<div id="viewer"></div>
<div id="counter"></div>
<div id="dots"></div>
<button class="nav-arrow" id="arrowUp"   onclick="goPrev()">▲</button>
<button class="nav-arrow" id="arrowDown" onclick="goNext()">▼</button>

<div id="panel-overlay" onclick="closePanel()"></div>
<div id="panel">
  <div id="panel-header">
    <h2>피드 관리</h2>
    <button class="icon-btn" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-body">
    <div id="feedList"></div>
    <button class="btn btn-primary btn-full" onclick="openAddModal()">+ 태그 추가</button>
  </div>
</div>

<div class="modal-overlay" id="feedModal">
  <div class="modal">
    <h2 id="modalTitle">태그 추가</h2>
    <div class="form-group">
      <label>이름</label>
      <input id="inputName" type="text" placeholder="예: 필름카메라" />
    </div>
    <div class="form-group">
      <label>Flickr 태그 (쉼표 구분)</label>
      <input id="inputTags" type="text" placeholder="예: film camera,analog" />
      <div class="form-hint">태그를 쉼표로 구분 — 예: film camera,35mm,analog photography</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary"   onclick="saveFeed()">저장</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'flickr-scroller-v1';
const FLICKR_FEED = 'https://api.flickr.com/services/feeds/photos_public.gne';

const DEFAULT_FEEDS = [
  { id: 'film-camera',     name: '필름카메라',       tags: 'film camera,analog photography' },
  { id: 'filmphotography', name: '필름 포토그래피',  tags: 'film photography,35mm film' },
  { id: 'lomography',      name: '로모그래피',        tags: 'lomography,lomo film' },
  { id: 'leica',           name: '라이카 / 클래식',  tags: 'leica film,rangefinder film' },
];

let feeds      = loadFeeds();
let currentId  = feeds[0]?.id;
let images     = [];
let currentIdx = 0;
let loading    = false;
let editingId  = null;

let touchStartY = 0, dragOffset = 0, isDragging = false, wheelTimer = null;

function loadFeeds() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return d.length ? d : JSON.parse(JSON.stringify(DEFAULT_FEEDS));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_FEEDS)); }
}
function saveFeeds() { localStorage.setItem(STORAGE_KEY, JSON.stringify(feeds)); }
function currentFeed() { return feeds.find(f => f.id === currentId); }

// ── Flickr 공개 피드 fetch ─────────────────────────────────
// api.flickr.com/services/feeds 는 공식 공개 API로 CORS 허용
async function fetchImages() {
  const feed = currentFeed();
  if (!feed) return [];

  const url = `${FLICKR_FEED}?tags=${encodeURIComponent(feed.tags)}&format=json&nojsoncallback=1&lang=ko-kr`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Flickr 오류: ${res.status}`);

  const data = await res.json();
  return (data.items || []).map(item => ({
    src: (item.media?.m || '').replace('_m.jpg', '_b.jpg'),
    title: item.title || '',
    postUrl: item.link || '',
    author: (item.author || '').replace(/.*\((.+)\)/, '$1'),
  })).filter(i => i.src);
}

// ── 슬라이드 ───────────────────────────────────────────────
function makeSlide(img) {
  const el = document.createElement('div');
  el.className = 'slide';
  const image = new Image();
  image.src = img.src;
  image.alt = img.title || '';
  image.onerror = () => {
    if (image.src.includes('_b.jpg')) {
      image.src = image.src.replace('_b.jpg', '_m.jpg');
    } else {
      el.remove();
    }
  };
  const cap = document.createElement('div');
  cap.className = 'slide-caption';
  cap.innerHTML = `
    <div class="title">${esc(img.title || '')}</div>
    <a href="${img.postUrl}" target="_blank" rel="noopener">Flickr에서 보기 ↗${img.author ? ' · ' + esc(img.author) : ''}</a>`;
  el.append(image, cap);
  return el;
}

function makeSpecial(type, msg) {
  const el = document.createElement('div');
  el.className = 'slide'; el.dataset.special = type;
  el.innerHTML = type === 'loading'
    ? `<div class="slide-center"><div class="spinner"></div><span>불러오는 중...</span></div>`
    : `<div class="slide-center">
         <div class="error-text">${msg}</div>
         <button class="btn btn-primary" style="margin-top:12px" onclick="retryLoad()">다시 시도</button>
       </div>`;
  return el;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function positionAll(extra) {
  [...document.getElementById('viewer').children].forEach((s, i) => {
    const base = `${(i - currentIdx) * 100}vh`;
    s.style.transform = extra != null ? `translateY(calc(${base} + ${extra}px))` : `translateY(${base})`;
  });
  updateDots(); updateCounter();
}

function updateDots() {
  const el = document.getElementById('dots');
  const max = 12, total = images.length;
  const start = Math.max(0, Math.min(currentIdx - 6, total - max));
  el.innerHTML = '';
  for (let i = start; i < Math.min(start + max, total); i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentIdx ? ' active' : '');
    el.appendChild(d);
  }
}
function updateCounter() {
  document.getElementById('counter').textContent = images.length ? `${currentIdx+1} / ${images.length}` : '';
}
function updateBadge() {
  const f = currentFeed();
  document.getElementById('badge').textContent = f ? f.name : '';
}

function goTo(idx) {
  if (idx < 0 || idx >= images.length) return;
  currentIdx = idx; positionAll();
}
function goNext() { goTo(currentIdx + 1); }
function goPrev() { goTo(currentIdx - 1); }

async function loadImages() {
  if (loading) return;
  loading = true;
  const viewer = document.getElementById('viewer');
  const ls = makeSpecial('loading');
  viewer.appendChild(ls);
  ls.style.transform = `translateY(${(viewer.children.length - 1 - currentIdx) * 100}vh)`;

  try {
    const newImgs = await fetchImages();
    viewer.removeChild(ls);
    if (!newImgs.length) {
      viewer.appendChild(makeSpecial('error', '이미지가 없습니다. 태그를 바꿔보세요.'));
    } else {
      images.push(...newImgs);
      newImgs.forEach((img, i) => {
        const s = makeSlide(img);
        s.style.transform = `translateY(${(images.length - newImgs.length + i - currentIdx) * 100}vh)`;
        viewer.appendChild(s);
      });
    }
    updateDots(); updateCounter();
  } catch (err) {
    viewer.removeChild(ls);
    const es = makeSpecial('error', err.message);
    es.style.transform = `translateY(${(viewer.children.length - currentIdx) * 100}vh)`;
    viewer.appendChild(es);
  }
  loading = false;
}

function retryLoad() {
  document.getElementById('viewer').querySelectorAll('[data-special]').forEach(e => e.remove());
  loadImages();
}

async function resetAndLoad() {
  images = []; currentIdx = 0; loading = false;
  document.getElementById('viewer').innerHTML = '';
  document.getElementById('dots').innerHTML = '';
  updateCounter(); updateBadge();
  await loadImages();
}

// ── 터치 / 휠 / 키보드 ────────────────────────────────────
const viewer = document.getElementById('viewer');
viewer.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY; isDragging = true; dragOffset = 0;
}, { passive: true });
viewer.addEventListener('touchmove', e => {
  if (!isDragging) return;
  dragOffset = e.touches[0].clientY - touchStartY;
  positionAll(dragOffset);
}, { passive: true });
viewer.addEventListener('touchend', () => {
  isDragging = false;
  Math.abs(dragOffset) > window.innerHeight * 0.18 ? (dragOffset > 0 ? goPrev() : goNext()) : positionAll();
  dragOffset = 0;
});
window.addEventListener('wheel', e => {
  e.preventDefault();
  if (wheelTimer) return;
  e.deltaY > 0 ? goNext() : goPrev();
  wheelTimer = setTimeout(() => wheelTimer = null, 500);
}, { passive: false });
document.addEventListener('keydown', e => {
  if (['ArrowDown','ArrowRight'].includes(e.key)) goNext();
  if (['ArrowUp','ArrowLeft'].includes(e.key))    goPrev();
  if (e.key === 'Escape') { closePanel(); closeModal(); }
});

// ── 패널 ───────────────────────────────────────────────────
function openPanel() {
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel-overlay').classList.add('open');
  renderFeedList();
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panel-overlay').classList.remove('open');
}
function renderFeedList() {
  document.getElementById('feedList').innerHTML = feeds.map(f => `
    <div class="feed-card ${f.id === currentId ? 'active' : ''}" onclick="switchFeed('${f.id}')">
      <div class="fc-name">${esc(f.name)}</div>
      <div class="fc-tag">${esc(f.tags)}</div>
      <div class="feed-card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-secondary" onclick="openEditModal('${f.id}')">수정</button>
        <button class="btn btn-danger"    onclick="deleteFeed('${f.id}')">삭제</button>
      </div>
    </div>`).join('');
}
function switchFeed(id) { currentId = id; closePanel(); resetAndLoad(); }

// ── 모달 ───────────────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '태그 추가';
  document.getElementById('inputName').value = '';
  document.getElementById('inputTags').value = '';
  document.getElementById('feedModal').classList.add('open');
}
function openEditModal(id) {
  const f = feeds.find(x => x.id === id); if (!f) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '태그 수정';
  document.getElementById('inputName').value = f.name;
  document.getElementById('inputTags').value = f.tags;
  document.getElementById('feedModal').classList.add('open');
}
function closeModal() { document.getElementById('feedModal').classList.remove('open'); }
function saveFeed() {
  const name = document.getElementById('inputName').value.trim();
  const tags = document.getElementById('inputTags').value.trim();
  if (!name || !tags) { alert('이름과 태그를 입력하세요'); return; }
  if (editingId) {
    const idx = feeds.findIndex(f => f.id === editingId);
    if (idx !== -1) feeds[idx] = { ...feeds[idx], name, tags };
  } else {
    feeds.push({ id: 'feed-' + Date.now(), name, tags });
  }
  saveFeeds(); closeModal(); renderFeedList();
}
function deleteFeed(id) {
  if (!confirm('삭제할까요?')) return;
  feeds = feeds.filter(f => f.id !== id); saveFeeds();
  if (currentId === id) { currentId = feeds[0]?.id; resetAndLoad(); }
  renderFeedList();
}

resetAndLoad();
</script>
</body>
</html>
